<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}动漫与动漫电影文件数据分析系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    {% block page_styles %}{% endblock %}
</head>

<body>
    <!-- 背景装饰 -->
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar" aria-label="主导航" aria-expanded="true">
        <div class="sidebar-header">
            <button class="sidebar-toggle" type="button" id="sidebarToggle" aria-label="切换侧边栏" aria-expanded="true"
                aria-controls="sidebar-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-logo">
                <span class="logo-text">AnimeFlow</span>
            </div>
        </div>
        {% set current_path = request.path %}
        <ul class="sidebar-menu" id="sidebar-menu">
            <li class="nav-item">
                <a href="{{ url_for('index') }}" class="nav-link {% if current_path == '/' or current_path == '/index' %}active{% endif %}" data-short="H" tabindex="0">
                    <span class="nav-text">首页</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('upload') }}" class="nav-link {% if current_path == '/upload' %}active{% endif %}" data-short="U" tabindex="0">
                    <span class="nav-text">上传数据</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('preview') }}" class="nav-link {% if current_path == '/preview' %}active{% endif %}" data-short="P" tabindex="0">
                    <span class="nav-text">数据预览</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('history') }}" class="nav-link {% if current_path == '/history' %}active{% endif %}" data-short="R" tabindex="0">
                    <span class="nav-text">数据记录</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-short="?" tabindex="0">
                    <span class="nav-text">帮助中心</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="account-menu" id="account-menu">
                <button class="nav-link account-trigger" type="button" data-short="ME" aria-haspopup="true" aria-expanded="false">
                    <span class="nav-text">个人中心</span>
                </button>
                <div class="account-dropdown" role="menu" aria-label="个人中心菜单">
                    <a class="account-item" href="#" role="menuitem">个人资料</a>
                    <a class="account-item" href="{{ url_for('auth') }}" data-auth-item role="menuitem">登录</a>
                </div>
            </div>
        </div>
    </aside>

    <div class="page-shell">
        <!-- 主内容区 -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <div class="footer-container">
                <p>&copy; 2025 AnimeFlow 动漫与动漫电影文件数据分析系统. 保留所有权利.</p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script/common.js') }}"></script>
    {% block page_scripts %}{% endblock %}
</body>

</html>
